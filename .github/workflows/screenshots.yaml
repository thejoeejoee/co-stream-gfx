name: GFX Screenshots
# Note: This workflow uses 'pull_request' trigger, which only works for same-repo PRs.
# Fork PRs are not supported (contents:write permission is unavailable for forks).
# This is acceptable — the project is single-developer (thejoeejoee).
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright and tsx
        id: tools
        run: |
          TOOL_DIR=$(mktemp -d)
          npm --prefix "$TOOL_DIR" install playwright@1.58.2 tsx@4.21.0
          "$TOOL_DIR/node_modules/.bin/playwright" install chromium --with-deps
          ln -s "$TOOL_DIR/node_modules/playwright" node_modules/playwright
          ln -s "$TOOL_DIR/node_modules/playwright-core" node_modules/playwright-core
          echo "dir=$TOOL_DIR" >> $GITHUB_OUTPUT

      - name: Build app
        run: bunx nuxt build --preset github_pages

      - name: Start preview server
        run: |
          npx -y serve .output/public -l 3000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && break
            sleep 1
          done

      - name: Run screenshot script
        run: |
          "${{ steps.tools.outputs.dir }}/node_modules/.bin/tsx" e2e/screenshots.ts --base-url http://localhost:3000 --output-dir ./screenshots

      - name: Push screenshots to _mr_previews branch
        id: push
        run: |
          cd screenshots
          git init
          git checkout --orphan _mr_previews
          git add -A
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "Screenshots for PR #${{ github.event.pull_request.number }}"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push --force origin _mr_previews
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Generate PR comment body
        id: comment
        run: |
          SHA="${{ steps.push.outputs.sha }}"
          REPO="${{ github.repository }}"
          
          # Build HTML comment with screenshots-bot marker
          BODY="<!-- screenshots-bot -->"$'\n'"## GFX Screenshots"$'\n'$'\n'"| Demo | CO | IOF |"$'\n'"|------|-----|-----|"

          DEMOS=(
            "flowers" "freetext" "live-feed" "live-feed.01"
            "live-feed.GFX1" "live-feed.GFX2" "live-feed.projected-2"
            "params" "params.01" "position-history.01"
            "results" "results.01" "results.changes"
            "single-runner" "single-runner.01" "single-runner.02"
            "single-runner.03" "single-runner.04" "speaker"
            "start.01" "start.02" "start.03" "start.04"
            "startlist" "startlist.01" "title" "weather"
          )

          for DEMO in "${DEMOS[@]}"; do
            CO_URL="https://raw.githubusercontent.com/${REPO}/${SHA}/${DEMO}-co.png"
            IOF_URL="https://raw.githubusercontent.com/${REPO}/${SHA}/${DEMO}-iof.png"
            BODY="${BODY}"$'\n'"| \`${DEMO}\` | <img src=\"${CO_URL}\" width=\"480\"> | <img src=\"${IOF_URL}\" width=\"480\"> |"
          done
          
          # Write to file to handle multiline
          echo "$BODY" > /tmp/comment-body.md
          echo "body_file=/tmp/comment-body.md" >> $GITHUB_OUTPUT

      - name: Find existing bot comment
        id: find-comment
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | contains("<!-- screenshots-bot -->")) | .id' | head -1)
          echo "comment_id=${COMMENT_ID}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create or update PR comment
        run: |
          BODY=$(cat /tmp/comment-body.md)
          if [ -n "${{ steps.find-comment.outputs.comment_id }}" ]; then
            gh api -X PATCH repos/${{ github.repository }}/issues/comments/${{ steps.find-comment.outputs.comment_id }} \
              -f body="$BODY"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
